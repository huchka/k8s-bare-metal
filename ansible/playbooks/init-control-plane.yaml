---
# Phase 3: Bootstrap the control plane (supports single and HA)
# Run: ansible-playbook -i ansible/inventory.ini ansible/playbooks/init-control-plane.yaml
#
# For a single CP node: runs kubeadm init, sets up kubeconfig, saves join commands.
# For multiple CP nodes: initializes cp1 first, then joins cp2..cpN as control plane members.
# Each CP node gets its own etcd member, apiserver, scheduler, and controller-manager.

# ──────────────────────────────────────────────────────
# Play 1: Initialize the first control plane node (cp1)
# ──────────────────────────────────────────────────────
- name: Initialize first control plane node
  hosts: "{{ groups['control_plane'][0] }}"
  become: true
  tasks:

    - name: Check if cluster is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_already_init

    # --control-plane-endpoint: All nodes (including workers) use this address
    # to reach the API server. In a real HA setup you'd put a load balancer here.
    # For a learning cluster, we point it at cp1's IP.
    #
    # --upload-certs: Uploads control plane certs to a Secret in the cluster
    # so additional CP nodes can download them during join. The certs are
    # encrypted with a key that expires after 2 hours.
    - name: Run kubeadm init
      command: >
        kubeadm init
        --pod-network-cidr=192.168.0.0/16
        --apiserver-advertise-address={{ ansible_host }}
        --control-plane-endpoint={{ ansible_host }}:6443
        --upload-certs
      when: not kubeadm_already_init.stat.exists
      register: kubeadm_init_output

    # Set up kubeconfig for the ubuntu user
    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy admin kubeconfig to ubuntu user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: true
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    # Generate worker join command (no --control-plane flag)
    - name: Generate worker join command
      command: kubeadm token create --print-join-command
      register: worker_join_command

    - name: Save worker join command to local file
      copy:
        content: "{{ worker_join_command.stdout }}"
        dest: /home/ubuntu/join-command.txt
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    - name: Fetch worker join command to controller
      fetch:
        src: /home/ubuntu/join-command.txt
        dest: "{{ playbook_dir }}/../../ansible/join-command.txt"
        flat: true

    # Generate control plane join command (with --control-plane + cert key)
    # Only needed when there are multiple CP nodes.
    - name: Upload certs and get certificate key
      command: kubeadm init phase upload-certs --upload-certs
      register: upload_certs_output
      when: groups['control_plane'] | length > 1

    - name: Extract certificate key
      set_fact:
        cert_key: "{{ upload_certs_output.stdout_lines[-1] }}"
      when: groups['control_plane'] | length > 1

    - name: Save control plane join command
      copy:
        content: "{{ worker_join_command.stdout }} --control-plane --certificate-key {{ cert_key }}"
        dest: /home/ubuntu/cp-join-command.txt
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      when: groups['control_plane'] | length > 1

    - name: Fetch control plane join command to controller
      fetch:
        src: /home/ubuntu/cp-join-command.txt
        dest: "{{ playbook_dir }}/../../ansible/cp-join-command.txt"
        flat: true
      when: groups['control_plane'] | length > 1

# ──────────────────────────────────────────────────────
# Play 2: Join additional control plane nodes (cp2, cp3, ...)
# ──────────────────────────────────────────────────────
- name: Join additional control plane nodes
  hosts: "{{ groups['control_plane'][1:] | default([]) }}"
  become: true
  serial: 1
  tasks:

    - name: Check if node has already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Read control plane join command
      slurp:
        src: "{{ playbook_dir }}/../../ansible/cp-join-command.txt"
      delegate_to: localhost
      become: false
      run_once: true
      register: cp_join_command_raw

    - name: Set join command fact
      set_fact:
        cp_join_command: "{{ cp_join_command_raw.content | b64decode | trim }}"

    # Each additional CP node joins with --control-plane, which:
    # 1. Downloads the shared certs using the certificate key
    # 2. Generates its own API server cert for its IP
    # 3. Joins as a new etcd cluster member
    # 4. Starts its own apiserver, scheduler, controller-manager
    - name: Join as control plane node
      command: "{{ cp_join_command }}"
      when: not kubelet_conf.stat.exists

    # Set up kubeconfig on this CP node too
    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy admin kubeconfig to ubuntu user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: true
        owner: ubuntu
        group: ubuntu
        mode: "0600"
